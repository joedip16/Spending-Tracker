<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50/30/20 Budget Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>50/30/20 Budget Tracker</h1>
    <p>Upload a Google Sheets file (exported as .xlsx or .csv) with "description" and "amount" columns.</p>
    <input type="file" id="upload" accept=".xlsx, .csv">
    <button id="process">Process Transactions</button>
    <table id="transactions">
        <thead>
            <tr>
                <th>Description</th>
                <th>Amount</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
            <!-- Transactions will be added here by JavaScript -->
        </tbody>
    </table>
    <button id="calculate" style="display: none;">Calculate Totals</button>
    <div id="totals">
        <div id="totals-text"></div>
        <canvas id="budgetChart" style="max-width: 400px; margin-top: 20px;"></canvas>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
